name: Keep RideFind3000 Alive
 
on:
  workflow_dispatch:
  schedule:
    # Runs every 5 minutes between 11:00 AM UTC and 5:00 AM UTC
    # That's 6:00 AM to midnight CDT (UTC-5)
    - cron: '*/5 11-23 * * *'
    - cron: '*/5 0-4 * * *'
 
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping RideFind3000
        run: curl -s -o /dev/null -w "%{http_code}" https://ridefind3000.com
